<!DOCTYPE html>
<html lang="ja"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Menu | bergamot シーシャバー 渋谷・赤坂</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Noto+Serif+JP:wght@200;300;400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e0e0e;
    --gold: #c9a96e;
    --gold-dim: rgba(201,169,110,0.15);
    --gold-line: rgba(201,169,110,0.3);
    --text: #e8e0d4;
    --text-muted: rgba(232,224,212,0.55);
    --white: #f5f0e8;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Serif JP', serif;
    font-weight: 300;
    overflow-x: hidden;
  }

  /* NAV */
  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    display: flex; justify-content: space-between; align-items: center;
    padding: 24px 48px;
    background: rgba(14,14,14,0.95);
    border-bottom: 1px solid var(--gold-line);
  }
  .nav-logo { text-decoration: none; display: flex; align-items: center; }
  .nav-logo img {
    height: 36px; width: auto;
    mix-blend-mode: screen;
    filter: sepia(1) saturate(5) hue-rotate(2deg) brightness(0.88);
    transition: opacity .3s;
  }
  .nav-logo:hover img { opacity: .72; }
  .nav-back {
    font-family: 'Cormorant Garamond', serif;
    font-size: 13px;
    letter-spacing: 0.18em;
    color: var(--text-muted);
    text-decoration: none;
    text-transform: uppercase;
    transition: color 0.3s;
    display: flex; align-items: center; gap: 8px;
  }
  .nav-back:hover { color: var(--gold); }
  .nav-back::before { content: '←'; font-size: 16px; }

  /* PAGE HEADER */
  .page-header {
    padding: 160px 48px 80px;
    text-align: center;
    border-bottom: 1px solid var(--gold-line);
  }
  .section-label {
    font-family: 'Cormorant Garamond', serif;
    font-size: 11px;
    letter-spacing: 0.4em;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 20px;
  }
  .page-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(40px, 6vw, 72px);
    font-weight: 300;
    letter-spacing: 0.1em;
    color: var(--white);
  }
  .page-title em {
    font-style: italic;
    color: var(--gold);
  }

  /* MENU GRID */
  .menu-section {
    padding: 80px 48px 120px;
    max-width: 1200px;
    margin: 0 auto;
  }
  .menu-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 24px;
  }
  .menu-card {
    border: 1px solid var(--gold-line);
    border-radius: 2px;
    overflow: hidden;
    transition: border-color 0.4s;
  }
  .menu-card:hover { border-color: rgba(201,169,110,0.5); }
  .menu-card img {
    width: 100%;
    display: block;
    transition: transform 0.6s ease;
  }
  .menu-card:hover img { transform: scale(1.02); }

  /* FOOTER */
  footer {
    text-align: center;
    padding: 48px;
    border-top: 1px solid var(--gold-line);
    color: var(--text-muted);
    font-family: 'Cormorant Garamond', serif;
    font-size: 12px;
    letter-spacing: 0.2em;
  }
  footer a { color: var(--gold); text-decoration: none; }

  @media (max-width: 768px) {
    nav { padding: 20px 24px; }
    .page-header { padding: 120px 24px 60px; }
    .menu-section { padding: 48px 24px 80px; }
    .menu-grid { grid-template-columns: 1fr; gap: 16px; }
  }
</style>
</head>
<body>

<nav>
  <a class="nav-logo" href="index.html">
    <img src="logo.jpg" alt="bergamot">
  </a>
  <a class="nav-back" href="index.html">トップへ戻る</a>
</nav>

<div class="page-header">
  <p class="section-label">Menu</p>
  <h1 class="page-title">メニュー<em>表</em></h1>
</div>

<div class="menu-section">
  <div class="menu-grid">
    <div class="menu-card"><img src="menu_1.jpg" alt="メニュー表 1"></div>
    <div class="menu-card"><img src="menu_2.jpg" alt="メニュー表 2"></div>
    <div class="menu-card"><img src="menu_3.jpg" alt="メニュー表 3"></div>
    <div class="menu-card"><img src="menu_4.jpg" alt="メニュー表 4"></div>
  </div>
</div>

<footer>
  <p>&copy; 2025 bergamot. All rights reserved.</p>
  <p style="margin-top:12px;">
    <a href="https://www.instagram.com/bergamot_shibuya/" target="_blank">渋谷店 Instagram</a>
    &nbsp;／&nbsp;
    <a href="https://www.instagram.com/bergamot_akasaka" target="_blank">赤坂店 Instagram</a>
  </p>
</footer>

</body>
</html>
